name: Mobile typecheck

# Sem filtros `paths` aqui de propósito: o workflow precisa SEMPRE iniciar
# para que o check obrigatório reporte status (success ou failure). Quando
# não há mudança relevante para o mobile, os passos pesados são pulados
# e o job termina verde imediatamente. Ver `Detect relevant changes` abaixo.
on:
  pull_request:
  push:
    branches:
      - main

# Cancela runs antigas se o mesmo PR/branch tiver novo push.
concurrency:
  group: mobile-typecheck-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: dular-mobile — tsc --noEmit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: dular-mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 é necessário para o `git diff BASE HEAD` da etapa
          # de detecção logo abaixo conseguir resolver ambos os SHAs.
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        working-directory: .
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          # Push inicial / branch novo: `before` vem como 40 zeros. Trate
          # como mudança relevante para não pular silenciosamente.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "Base SHA ausente ou inicial — tratando como mudança relevante."
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Garante que BASE esteja disponível localmente (PRs de fork podem
          # exigir fetch explícito).
          git fetch --no-tags origin "$BASE" 2>/dev/null || true
          CHANGED="$(git diff --name-only "$BASE" "$HEAD" || true)"
          echo "Arquivos alterados:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -E '^(dular-mobile/|\.github/workflows/mobile-typecheck\.yml$)' >/dev/null; then
            echo "Mudança relevante detectada em dular-mobile/** ou neste workflow."
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "No mobile changes detected; reporting success without running mobile typecheck."
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node 20
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dular-mobile/package-lock.json

      - name: Install dependencies (ci, deterministic)
        if: steps.changes.outputs.relevant == 'true'
        run: npm ci

      - name: TypeScript type-check
        if: steps.changes.outputs.relevant == 'true'
        run: npx tsc --noEmit --pretty false

  # Notas operacionais:
  # - expo-doctor / lint / build EAS ficam fora deste workflow para manter o
  #   gate leve (<3min) e focado. expo-doctor exige tooling extra e tende a
  #   produzir falsos positivos em sub-deps que não dependem deste repo.
  # - Quando houver demanda, criar workflows separados (mobile-lint.yml,
  #   mobile-build.yml) em vez de inchar este.
