# Dependabot — Dular
#
# Política: alertas de vulnerabilidade abertos por padrão. Apenas 4 pacotes
# estão silenciados aqui, todos transitivos via Prisma/Next/Expo, com
# decisão registrada em `docs/SECURITY-DEBT.md`.
#
# REGRA: NÃO ignorar nada além desta lista sem atualizar SECURITY-DEBT.md.
# REGRA: NUNCA usar `npm audit fix --force` neste repositório.
#
# Os `ignore` abaixo são TEMPORÁRIOS — devem ser removidos no upgrade major
# correspondente (Prisma / Next / Expo). Ver "Quando reabrir" em
# docs/SECURITY-DEBT.md.

version: 2
updates:
  # ---------- WEB (Next.js + Prisma) ----------
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "web"
    ignore:
      # Transitivo via Prisma dev tooling. Vulnerável em <1.19.13
      # (GHSA-92pp-h63x-v22m, middleware bypass em serveStatic do Hono).
      # Não rodamos serveStatic em produção; @prisma/dev é dev-only.
      # Resolver no upgrade major do Prisma.
      - dependency-name: "@hono/node-server"

      # Transitivo via Next/next-auth. Vulnerável em <8.5.10
      # (GHSA-qx2v-qp2m-jg93, XSS no stringify do PostCSS).
      # Roda em build-time; não processamos CSS de usuário.
      # Resolver no upgrade major do Next.
      - dependency-name: "postcss"

  # ---------- MOBILE (Expo) ----------
  - package-ecosystem: "npm"
    directory: "/dular-mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "mobile"
    ignore:
      # Transitivo via @expo/metro-config. Mesma CVE do postcss web —
      # toolchain de build do Metro, não roda no app empacotado.
      # Resolver no upgrade major do Expo.
      - dependency-name: "postcss"

      # Transitivo via @expo/config-plugins → xcode → uuid.
      # Vulnerável em <11.1.1 (GHSA-w5hq-g745-h8pq, buffer bounds em
      # v3/v5/v6). Caminho é prebuild iOS — input controlado pela
      # toolchain Expo, sem vetor de input externo.
      # Resolver no upgrade major do Expo.
      - dependency-name: "uuid"

      # Pacotes expo-* são acoplados à versão do Expo SDK (expo@~54 / SDK54),
      # via bundledNativeModules. O Dependabot não entende esse acoplamento e
      # abre PRs subindo-os para a linha "56.x" (ex.: expo-notifications@56,
      # expo-location@56, expo-font@56), incompatível com o SDK54 — o que quebra
      # o CI em dois pontos: `npm ci` falha com EUSAGE (package.json/lock fora de
      # sync) e `tsc` falha (TS2339: o tipo perde `.status`). Já recorreu 2x
      # (commits e602310 e c6d45ed). Atualizar SEMPRE via `expo install` /
      # upgrade de SDK, nunca individualmente.
      # Bloqueia só version-updates major/minor (os bumps bogus são todos major);
      # alertas de SEGURANÇA seguem abertos, conforme a política deste arquivo.
      - dependency-name: "expo"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

      # react / react-native / @types/react também são acoplados ao SDK.
      # SDK54 = react 19.1.0 + react-native 0.81 (ver tabela do SDK e
      # bundledNativeModules); react 19.2.x só entra no SDK55. O Dependabot
      # subiu react 19.1.0→19.1.8 (patch!) e react-native 0.81.5→0.81.6 —
      # react-native 0.81.6 exige react@^19.1.4, quebrando npm ci (ERESOLVE).
      # O renderer do RN exige match exato de versão com react, então qualquer
      # bump autônomo quebra runtime. Bloqueia major/minor/patch; apenas alertas
      # de SEGURANÇA seguem abertos.
      - dependency-name: "react"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "react-native-*"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]

  # ---------- GITHUB ACTIONS ----------
  # Mantém os pinned actions atualizados (actions/checkout, setup-node).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
