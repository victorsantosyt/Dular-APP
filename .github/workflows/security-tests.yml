name: Security tests

# Sem filtros `paths` aqui de propósito: o workflow precisa SEMPRE iniciar
# para que o check obrigatório reporte status (success ou failure). Quando
# não há mudança relevante para web/security, os passos pesados são pulados
# e o job termina verde imediatamente. Ver `Detect relevant changes` abaixo.
on:
  pull_request:
  push:
    branches:
      - main

# Cancela runs antigas se o mesmo PR/branch tiver novo push.
concurrency:
  group: security-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    name: web — helpers + rotas
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Vars dummy: as mesmas usadas em `npm run test:security`. Não são segredos
    # reais — o test runner monta JWT com este SECRET e nenhuma das rotas
    # testadas executa query no Prisma de verdade (todas mockadas via
    # globalThis.prisma).
    env:
      JWT_SECRET: test_only_do_not_use_in_prod
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      STRIPE_SECRET_KEY: sk_test_dummy_do_not_use
      NODE_ENV: test
      LOG_LEVEL: silent

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # fetch-depth: 0 é necessário para o `git diff BASE HEAD` da etapa
          # de detecção logo abaixo conseguir resolver ambos os SHAs.
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        working-directory: .
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          # Push inicial / branch novo: `before` vem como 40 zeros. Trate
          # como mudança relevante para não pular silenciosamente.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "Base SHA ausente ou inicial — tratando como mudança relevante."
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Garante que BASE esteja disponível localmente (PRs de fork podem
          # exigir fetch explícito).
          git fetch --no-tags origin "$BASE" 2>/dev/null || true
          CHANGED="$(git diff --name-only "$BASE" "$HEAD" || true)"
          echo "Arquivos alterados:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -E '^(web/|\.github/workflows/security-tests\.yml$)' >/dev/null; then
            echo "Mudança relevante detectada em web/** ou neste workflow."
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "No web/security changes detected; reporting success without running web security suite."
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node 20
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies (ci, deterministic)
        if: steps.changes.outputs.relevant == 'true'
        run: npm ci

      - name: Generate Prisma client
        if: steps.changes.outputs.relevant == 'true'
        run: npx prisma generate

      - name: Validate Prisma schema
        if: steps.changes.outputs.relevant == 'true'
        run: npx prisma validate

      - name: TypeScript type-check
        if: steps.changes.outputs.relevant == 'true'
        run: npx tsc --noEmit --pretty false

      - name: Run security test suite
        if: steps.changes.outputs.relevant == 'true'
        run: npm run test:security

  # Mobile fica fora do workflow de segurança para manter o gate rápido (<3min).
  # Ver `.github/workflows/mobile-typecheck.yml`.
